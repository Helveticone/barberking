<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Espace pro — Barber King</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css?v=3">
<style>
  body{ background: var(--paper); min-height: 100vh; }
  .admin-wrap{ max-width: 860px; margin: 0 auto; padding: 40px 24px 80px; }
  .admin-header{ display:flex; align-items:center; justify-content:space-between; margin-bottom: 32px; }
  .admin-header h1{ font-size: 1.5rem; }
  #loginPanel{ max-width: 360px; margin: 80px auto; text-align:center; }
  #loginPanel .field{ width:100%; margin-bottom:16px; }
  #loginError{ color: var(--red); font-size:.9rem; min-height:1.2em; margin-top:8px; }
  .day-group{ margin-bottom: 32px; }
  .day-group h2{ font-family: var(--font-display); text-transform: uppercase; font-size:1.05rem; letter-spacing:.03em; margin-bottom: 12px; color: var(--red); }
  .appt-row{
    display:flex; align-items:center; justify-content:space-between; gap:16px;
    background: var(--white); border:1px solid rgba(23,20,15,.08); border-radius: var(--radius);
    padding: 14px 18px; margin-bottom: 8px;
  }
  .appt-row__time{ font-family: var(--font-display); font-size:1.1rem; min-width:64px; }
  .appt-row__info{ flex:1; }
  .appt-row__info strong{ display:block; }
  .appt-row__info span{ color: var(--grey); font-size:.88rem; }
  .appt-row__cancel{ background:none; border:1px solid rgba(158,43,37,.4); color:var(--red); border-radius:999px; padding:6px 14px; font-size:.82rem; cursor:pointer; }
  .appt-row__cancel:hover{ background: rgba(158,43,37,.08); }
  .empty-day{ color: var(--grey); font-size:.9rem; }
  .block-form{ display:flex; flex-wrap:wrap; gap:10px; align-items:flex-end; background:var(--white); border:1px solid rgba(23,20,15,.08); border-radius:var(--radius); padding:18px; margin-bottom:32px; }
  .block-form label{ font-size:.78rem; color:var(--grey); display:block; margin-bottom:4px; }
  .block-form input{ padding:9px 12px; border-radius:var(--radius); border:1.5px solid rgba(23,20,15,.15); font-family: var(--font-body); }
  .blocks-list{ font-size:.9rem; color:var(--grey); }
  .blocks-list li{ display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid rgba(23,20,15,.08); }
  section.panel{ margin-bottom: 40px; }
  section.panel h2.section-title{ font-family: var(--font-display); text-transform:uppercase; font-size:1.15rem; margin-bottom:14px; }
</style>
</head>
<body>

<div id="loginPanel">
  <p class="eyebrow eyebrow--dark">Barber King</p>
  <h1 class="section__title" style="font-size:1.6rem;">Espace pro</h1>
  <input type="password" id="passwordInput" class="field" placeholder="Mot de passe">
  <button type="button" id="loginBtn" class="btn btn--primary btn--lg" style="width:100%;">Se connecter</button>
  <p id="loginError"></p>
</div>

<div class="admin-wrap" id="dashboard" hidden>
  <div class="admin-header">
    <div>
      <p class="eyebrow eyebrow--dark" style="margin-bottom:4px;">Barber King</p>
      <h1>Planning de Hassan</h1>
    </div>
    <button type="button" id="logoutBtn" class="btn btn--ghost">Se déconnecter</button>
  </div>

  <section class="panel">
    <h2 class="section-title">Bloquer un créneau</h2>
    <div class="block-form">
      <div>
        <label for="blockDate">Date</label>
        <input type="date" id="blockDate">
      </div>
      <div>
        <label for="blockStart">De</label>
        <input type="time" id="blockStart" value="12:00">
      </div>
      <div>
        <label for="blockEnd">À</label>
        <input type="time" id="blockEnd" value="13:00">
      </div>
      <div style="flex:1; min-width:160px;">
        <label for="blockReason">Motif (facultatif)</label>
        <input type="text" id="blockReason" placeholder="ex. pause, rendez-vous perso" style="width:100%;">
      </div>
      <button type="button" id="addBlockBtn" class="btn btn--primary">Bloquer</button>
    </div>
    <ul class="blocks-list" id="blocksList"></ul>
  </section>

  <section class="panel">
    <h2 class="section-title">Rendez-vous à venir (7 prochains jours)</h2>
    <div id="appointmentsWrap">
      <p class="booking__hint">Chargement…</p>
    </div>
  </section>
</div>

<script>
(function () {
  "use strict";
  var loginPanel = document.getElementById("loginPanel");
  var dashboard = document.getElementById("dashboard");
  var passwordInput = document.getElementById("passwordInput");
  var loginBtn = document.getElementById("loginBtn");
  var loginError = document.getElementById("loginError");
  var logoutBtn = document.getElementById("logoutBtn");

  function todayISO() {
    return new Intl.DateTimeFormat("en-CA", { timeZone: "Europe/Zurich" }).format(new Date());
  }
  function addDays(iso, days) {
    var d = new Date(iso + "T00:00:00Z");
    d.setUTCDate(d.getUTCDate() + days);
    return d.toISOString().slice(0, 10);
  }

  async function login() {
    loginError.textContent = "";
    try {
      var res = await fetch("/api/admin/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password: passwordInput.value })
      });
      if (!res.ok) { loginError.textContent = "Mot de passe incorrect."; return; }
      showDashboard();
    } catch (e) {
      loginError.textContent = "Erreur réseau.";
    }
  }

  async function logout() {
    await fetch("/api/admin/logout", { method: "POST" });
    dashboard.hidden = true;
    loginPanel.hidden = false;
    passwordInput.value = "";
  }

  function showDashboard() {
    loginPanel.hidden = true;
    dashboard.hidden = false;
    loadAppointments();
    loadBlocks();
  }

  async function loadAppointments() {
    var wrap = document.getElementById("appointmentsWrap");
    wrap.innerHTML = "<p class=\"booking__hint\">Chargement…</p>";
    var from = todayISO();
    var to = addDays(from, 7);
    var fromUTC = new Date(from + "T00:00:00+01:00").toISOString(); // approximatif, affiné ci-dessous
    try {
      var res = await fetch("/api/admin/appointments?from=" + encodeURIComponent(from + "T00:00:00.000Z") + "&to=" + encodeURIComponent(to + "T23:59:59.000Z"));
      if (res.status === 401) { logout(); return; }
      var rows = await res.json();
      renderAppointments(rows);
    } catch (e) {
      wrap.innerHTML = "<p class=\"booking__hint\">Erreur de chargement.</p>";
    }
  }

  function renderAppointments(rows) {
    var wrap = document.getElementById("appointmentsWrap");
    wrap.innerHTML = "";
    if (!rows.length) {
      wrap.innerHTML = "<p class=\"empty-day\">Aucun rendez-vous sur les 7 prochains jours.</p>";
      return;
    }
    var groups = {};
    rows.forEach(function (r) {
      var d = new Date(r.start_at);
      var dayKey = new Intl.DateTimeFormat("fr-CH", { timeZone: "Europe/Zurich", weekday: "long", day: "numeric", month: "long" }).format(d);
      if (!groups[dayKey]) groups[dayKey] = [];
      groups[dayKey].push(r);
    });
    Object.keys(groups).forEach(function (dayKey) {
      var group = document.createElement("div");
      group.className = "day-group";
      var h2 = document.createElement("h2");
      h2.textContent = dayKey;
      group.appendChild(h2);
      groups[dayKey].forEach(function (r) {
        var time = new Intl.DateTimeFormat("fr-CH", { timeZone: "Europe/Zurich", hour: "2-digit", minute: "2-digit" }).format(new Date(r.start_at));
        var row = document.createElement("div");
        row.className = "appt-row";
        row.innerHTML =
          "<span class=\"appt-row__time\">" + time + "</span>" +
          "<span class=\"appt-row__info\"><strong></strong><span></span></span>" +
          "<button type=\"button\" class=\"appt-row__cancel\">Annuler</button>";
        row.querySelector("strong").textContent = r.client_name;
        row.querySelector(".appt-row__info span").textContent = r.service_name + " · " + r.price_chf.toFixed(0) + ".- · " + r.client_phone;
        row.querySelector(".appt-row__cancel").addEventListener("click", function () { cancelAppointment(r.id); });
        group.appendChild(row);
      });
      wrap.appendChild(group);
    });
  }

  async function cancelAppointment(id) {
    if (!confirm("Annuler ce rendez-vous ?")) return;
    await fetch("/api/admin/appointments/" + id + "/cancel", { method: "POST" });
    loadAppointments();
  }

  async function loadBlocks() {
    var from = todayISO();
    var to = addDays(from, 30);
    var res = await fetch("/api/admin/blocks?from=" + from + "T00:00:00.000Z&to=" + to + "T23:59:59.000Z");
    if (res.status === 401) { logout(); return; }
    var rows = await res.json();
    var list = document.getElementById("blocksList");
    list.innerHTML = "";
    rows.forEach(function (b) {
      var start = new Intl.DateTimeFormat("fr-CH", { timeZone: "Europe/Zurich", weekday: "short", day: "numeric", month: "short", hour: "2-digit", minute: "2-digit" }).format(new Date(b.start_at));
      var end = new Intl.DateTimeFormat("fr-CH", { timeZone: "Europe/Zurich", hour: "2-digit", minute: "2-digit" }).format(new Date(b.end_at));
      var li = document.createElement("li");
      li.innerHTML = "<span>" + start + " – " + end + (b.reason ? " · " + b.reason : "") + "</span> <button type=\"button\" style=\"background:none;border:none;color:var(--red);cursor:pointer;\">Retirer</button>";
      li.querySelector("button").addEventListener("click", async function () {
        await fetch("/api/admin/blocks/" + b.id, { method: "DELETE" });
        loadBlocks();
      });
      list.appendChild(li);
    });
  }

  document.getElementById("addBlockBtn").addEventListener("click", async function () {
    var date = document.getElementById("blockDate").value;
    var startTime = document.getElementById("blockStart").value;
    var endTime = document.getElementById("blockEnd").value;
    var reason = document.getElementById("blockReason").value;
    if (!date || !startTime || !endTime) { alert("Merci de renseigner la date et les heures."); return; }
    await fetch("/api/admin/blocks", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ date: date, startTime: startTime, endTime: endTime, reason: reason })
    });
    loadBlocks();
    loadAppointments();
  });

  loginBtn.addEventListener("click", login);
  passwordInput.addEventListener("keydown", function (e) { if (e.key === "Enter") login(); });
  logoutBtn.addEventListener("click", logout);
  document.getElementById("blockDate").value = todayISO();

  // Si une session valide existe déjà (cookie), tente direct le dashboard.
  fetch("/api/admin/appointments?from=" + todayISO() + "T00:00:00.000Z&to=" + todayISO() + "T23:59:59.000Z")
    .then(function (res) { if (res.ok) showDashboard(); })
    .catch(function () {});
})();
</script>
</body>
</html>
